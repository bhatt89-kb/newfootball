name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Setup Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
        
    - name: Install Dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        
    - name: Run Ruff Linter
      working-directory: ./backend
      run: ruff check . --output-format=github
      
    - name: Run Black Format Check
      working-directory: ./backend
      run: black --check --diff .
      
    - name: Run mypy Type Check
      working-directory: ./backend
      run: mypy app --strict --ignore-missing-imports
      
    - name: Run pytest with Coverage
      working-directory: ./backend
      run: |
        pytest --cov=app --cov-report=xml --cov-report=term-missing --cov-fail-under=90
        
    - name: Upload Coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./backend/coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
        
    - name: Archive Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          ./backend/coverage.xml
          ./backend/htmlcov/
          
  security:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Setup Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install Security Tools
      run: |
        pip install pip-audit bandit safety
        
    - name: Run pip-audit
      working-directory: ./backend
      run: pip-audit -r requirements.txt --desc
      continue-on-error: true
      
    - name: Run Bandit Security Scan
      working-directory: ./backend
      run: bandit -r app -f json -o bandit-report.json
      continue-on-error: true
      
    - name: Run Safety Check
      working-directory: ./backend
      run: safety check --json
      continue-on-error: true
      
    - name: Upload Security Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: |
          ./backend/bandit-report.json
          
  docker:
    runs-on: ubuntu-latest
    needs: [test, security]
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build Docker Image
      working-directory: ./backend
      run: |
        docker build -t stadiumos-genai:${{ github.sha }} .
        docker images
        
    - name: Test Docker Image
      run: |
        docker run -d -p 8000:8000 --name test-container \
          -e GEMINI_API_KEY=test-key \
          stadiumos-genai:${{ github.sha }}
        sleep 5
        curl -f http://localhost:8000/ || exit 1
        docker stop test-container
        
    - name: Scan Docker Image with Trivy
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: stadiumos-genai:${{ github.sha }}
        format: 'sarif'
        output: 'trivy-results.sarif'
      continue-on-error: true
      
    - name: Upload Trivy Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: trivy-results
        path: trivy-results.sarif
