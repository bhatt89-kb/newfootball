services:
  - type: redis
    name: stadiumos-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  - type: web
    name: stadiumos-backend
    runtime: docker
    rootDir: stadiumos-genai-complete/backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free

    envVars:
      - key: GEMINI_API_KEY
        sync: false

      - key: GEMINI_MODEL
        value: gemini-2.0-flash

      - key: REDIS_ENABLED
        value: false

      - key: ENVIRONMENT
        value: production

      - key: DEBUG
        value: false

      - key: ADMIN_API_KEY
        generateValue: true

      - key: ALLOWED_ORIGINS
        value: '["https://stadiumos-frontend.onrender.com"]'

      - key: ENABLE_RULE_BASED_FALLBACK
        value: true

    healthCheckPath: /api/v1/health
    autoDeploy: true

  - type: web
    name: stadiumos-frontend
    runtime: static
    rootDir: stadiumos-genai-complete/frontend
    buildCommand: echo "Static files ready"
    staticPublishPath: .
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    autoDeploy: true